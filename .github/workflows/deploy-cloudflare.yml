name: Deploy Cloudflare Worker Assets

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 241fc992ba01afb2677e775bc6e3ecb2
      CLOUDFLARE_WORKER_NAME: solitary-sea-c74e
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Preflight deploy inputs
        run: bash scripts/deploy.sh --preflight-only

      - name: Deploy latest assets
        run: bash scripts/deploy.sh
